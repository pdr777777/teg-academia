name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: teg_academia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/teg_academia_test
      JWT_SECRET: ci-only-secret-nao-usar-em-producao-min-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Criar schema de teste
        run: psql "$DATABASE_URL" -c "CREATE SCHEMA IF NOT EXISTS academia_test;"
        env:
          PGPASSWORD: postgres

      - name: Rodar migrations
        working-directory: backend
        run: node run-migrations.js

      - name: Rodar testes
        working-directory: backend
        run: npm test
