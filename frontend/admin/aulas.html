<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aulas - TEG Academia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../assets/img/favicon.png" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/app-effects.css" />
  <script src="../assets/js/theme.js"></script>
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <a href="../index.html" class="brand" title="Voltar para o site"><img src="../assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ADMIN</span></a>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-foot">
        <button type="button" id="btn-theme-toggle" data-theme-toggle class="btn btn-ghost btn-sm btn-block" data-icon="sun" data-icon-size="16" style="justify-content:flex-start;gap:0.7rem;padding:0.65rem 0.75rem;color:var(--color-muted)">Tema</button>
        <a href="#" id="btn-logout"><span data-icon="log-out" data-icon-size="18"></span>Sair</a>
      </div>
    </aside>

    <div class="main-content">
      <div class="page-head">
        <button class="btn btn-ghost btn-sm sidebar-toggle" id="btn-sidebar-toggle" data-icon="menu"></button>
        <div>
          <h1>Aulas</h1>
          <p>Grade de horários das aulas coletivas, editável sem programador.</p>
        </div>
        <button class="btn btn-primary" id="btn-nova-aula"><span data-icon="plus" data-icon-size="16"></span>Nova aula</button>
      </div>

      <div class="table-wrap" data-reveal>
        <table>
          <thead>
            <tr><th>Aula</th><th>Dia</th><th>Horário</th><th>Professor</th><th>Capacidade</th><th>Status</th><th style="width:90px"></th></tr>
          </thead>
          <tbody id="aulas-body">
            <tr><td colspan="7" class="loading-row"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <dialog id="dialog-aula" class="admin-dialog">
    <form id="form-aula" method="dialog">
      <h2 id="aula-dialog-titulo">Nova aula</h2>
      <input type="hidden" id="aula-id" />

      <div class="field">
        <label class="field-label">Nome</label>
        <input type="text" id="aula-nome" placeholder="Ex: Spinning" required />
      </div>
      <div class="grid grid-2" style="gap:0.75rem">
        <div class="field">
          <label class="field-label">Dia da semana</label>
          <select id="aula-dia" required>
            <option value="0">Domingo</option>
            <option value="1">Segunda</option>
            <option value="2">Terça</option>
            <option value="3">Quarta</option>
            <option value="4">Quinta</option>
            <option value="5">Sexta</option>
            <option value="6">Sábado</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Capacidade</label>
          <input type="number" id="aula-capacidade" min="1" value="20" required />
        </div>
      </div>
      <div class="grid grid-2" style="gap:0.75rem">
        <div class="field">
          <label class="field-label">Início</label>
          <input type="time" id="aula-hora-inicio" required />
        </div>
        <div class="field">
          <label class="field-label">Fim</label>
          <input type="time" id="aula-hora-fim" required />
        </div>
      </div>
      <div class="field">
        <label class="field-label">Professor</label>
        <select id="aula-professor">
          <option value="">Sem professor definido</option>
        </select>
      </div>

      <div class="dialog-actions">
        <button type="button" class="btn btn-ghost" id="btn-aula-cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btn-aula-confirm">Salvar</button>
      </div>
    </form>
  </dialog>

  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/sidebar-nav.js"></script>
  <script src="../assets/js/app-effects.js"></script>
  <script src="../assets/js/admin-guard.js"></script>
  <script src="../assets/js/admin-aulas.js"></script>
</body>
</html>
