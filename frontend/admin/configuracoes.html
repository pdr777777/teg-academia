<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurações — TEG Academia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../assets/img/favicon.png" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/app-effects.css" />
  <script src="../assets/js/theme.js"></script>
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><img src="../assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ADMIN</span></div>
      <nav class="sidebar-nav">
        <a href="index.html"><span data-icon="grid" data-icon-size="18"></span>Dashboard</a>
        <a href="financeiro.html" data-role-dono><span data-icon="wallet" data-icon-size="18"></span>Financeiro</a>
        <a href="alunos.html"><span data-icon="users" data-icon-size="18"></span>Alunos</a>
        <a href="ranking.html"><span data-icon="award" data-icon-size="18"></span>Ranking</a>
        <a href="frequencia.html"><span data-icon="clock" data-icon-size="18"></span>Frequência</a>
        <a href="treinos.html"><span data-icon="dumbbell" data-icon-size="18"></span>Treinos</a>
        <a href="aulas.html"><span data-icon="clipboard-list" data-icon-size="18"></span>Aulas</a>
        <a href="planos.html"><span data-icon="package" data-icon-size="18"></span>Planos</a>
        <a href="crm.html"><span data-icon="columns" data-icon-size="18"></span>CRM</a>
        <a href="pagamentos.html"><span data-icon="credit-card" data-icon-size="18"></span>Pagamentos</a>
        <a href="equipe.html" data-role-dono><span data-icon="briefcase" data-icon-size="18"></span>Equipe</a>
        <a href="configuracoes.html" class="active"><span data-icon="sliders" data-icon-size="18"></span>Configurações</a>
      </nav>
      <div class="sidebar-foot">
        <button type="button" id="btn-theme-toggle" data-theme-toggle class="btn btn-ghost btn-sm btn-block" data-icon="sun" data-icon-size="16" style="justify-content:flex-start;gap:0.7rem;padding:0.65rem 0.75rem;color:var(--color-muted)">Tema</button>
        <a href="#" id="btn-logout"><span data-icon="log-out" data-icon-size="18"></span>Sair</a>
      </div>
    </aside>

    <div class="main-content">
      <div class="page-head">
        <button class="btn btn-ghost btn-sm sidebar-toggle" id="btn-sidebar-toggle" data-icon="menu"></button>
        <div>
          <h1>Configurações</h1>
          <p>Preferências da conta e da academia.</p>
        </div>
      </div>

      <div class="card" data-reveal style="max-width:640px;margin-bottom:1.5rem">
        <h2 style="margin-bottom:0.25rem">Aparência</h2>
        <div class="settings-row">
          <div class="settings-row-label">
            <strong>Tema claro</strong>
            <span>Alterna entre o visual escuro (padrão) e o claro.</span>
          </div>
          <div class="settings-row-control">
            <label class="switch">
              <input type="checkbox" data-theme-switch />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="card" data-reveal style="max-width:640px;margin-bottom:1.5rem">
        <h2 style="margin-bottom:1rem">Minha conta</h2>
        <form id="form-senha">
          <div class="field">
            <label class="field-label">Senha atual</label>
            <input type="password" id="senha-atual" required />
          </div>
          <div class="field">
            <label class="field-label">Nova senha</label>
            <input type="password" id="senha-nova" placeholder="mín. 8 caracteres, com letra e número" required />
          </div>
          <div class="field">
            <label class="field-label">Confirmar nova senha</label>
            <input type="password" id="senha-confirmar" required />
          </div>
          <button type="submit" class="btn btn-primary" id="btn-senha-salvar">Salvar nova senha</button>
        </form>
      </div>

      <div class="card" data-reveal data-role-dono style="max-width:640px">
        <h2 style="margin-bottom:1rem">Dados da academia</h2>
        <form id="form-academia">
          <div class="field">
            <label class="field-label">Nome da academia</label>
            <input type="text" id="academia-nome" required />
          </div>
          <div class="field">
            <label class="field-label">Meta de faturamento mensal (R$)</label>
            <input type="number" id="academia-meta-faturamento" min="0" step="0.01" />
          </div>
          <div class="field">
            <label class="field-label">Meta de novos alunos por mês</label>
            <input type="number" id="academia-meta-alunos" min="0" step="1" />
          </div>
          <button type="submit" class="btn btn-primary" id="btn-academia-salvar">Salvar dados da academia</button>
        </form>
      </div>
    </div>
  </div>

  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/app-effects.js"></script>
  <script src="../assets/js/admin-guard.js"></script>
  <script src="../assets/js/admin-configuracoes.js"></script>
</body>
</html>
