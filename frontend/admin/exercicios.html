<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Exercício - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../assets/img/favicon.png" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/app-effects.css" />
  <script src="../assets/js/theme.js"></script>
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <a href="../index.html" class="brand" title="Voltar para o site"><img src="../assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ADMIN</span></a>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-foot">
        <button type="button" id="btn-theme-toggle" data-theme-toggle class="btn btn-ghost btn-sm btn-block" data-icon="sun" data-icon-size="16" style="justify-content:flex-start;gap:0.7rem;padding:0.65rem 0.75rem;color:var(--color-muted)">Tema</button>
        <a href="#" id="btn-logout"><span data-icon="log-out" data-icon-size="18"></span>Sair</a>
      </div>
    </aside>

    <div class="main-content">
      <div class="page-head">
        <button class="btn btn-ghost btn-sm sidebar-toggle" id="btn-sidebar-toggle" data-icon="menu"></button>
        <div>
          <h1>Exercício</h1>
          <p>Biblioteca de exercícios usada para montar os treinos.</p>
        </div>
        <button class="btn btn-primary btn-sm" id="btn-novo-exercicio">
          <span data-icon="plus" data-icon-size="14"></span>Novo
        </button>
      </div>

      <div class="card" data-reveal>
        <div class="row gap-sm" style="margin-bottom:1rem">
          <div class="search-field" style="flex:1;position:relative">
            <span data-icon="search" data-icon-size="16" style="position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--color-muted)"></span>
            <input type="text" id="busca-exercicio-lib" class="input" placeholder="Buscar exercício..." style="padding-left:2.5rem" />
          </div>
          <select id="filtro-grupo-lib" class="input" style="max-width:200px">
            <option value="">Todos os grupos</option>
          </select>
        </div>
        <div id="exercicio-lib-grid" class="exercicio-lib-grid">
          <div class="loading-row"><span class="spinner"></span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dialog cadastrar/editar exercício -->
  <dialog id="dialog-exercicio" class="admin-dialog" style="max-width:440px">
    <form id="form-exercicio" method="dialog">
      <h2 id="exercicio-dialog-titulo">Novo exercício</h2>

      <label class="field-label">Nome <span class="text-danger">*</span></label>
      <input type="text" id="exercicio-nome-input" class="input" placeholder="ex: Supino Reto" required />

      <label class="field-label" style="margin-top:.9rem">Grupo muscular</label>
      <select id="exercicio-grupo-input" class="input">
        <option value="">Selecione...</option>
      </select>

      <label class="field-label" style="margin-top:.9rem">URL da imagem</label>
      <input type="url" id="exercicio-imagem-input" class="input" placeholder="https://..." />

      <label class="field-label" style="margin-top:.9rem">URL do vídeo</label>
      <input type="url" id="exercicio-video-input" class="input" placeholder="https://..." />

      <div class="dialog-actions">
        <button type="button" class="btn btn-ghost" id="btn-exercicio-cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btn-exercicio-confirm">Salvar exercício</button>
      </div>
    </form>
  </dialog>

  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/sidebar-nav.js"></script>
  <script src="../assets/js/app-effects.js"></script>
  <script src="../assets/js/admin-guard.js"></script>
  <script src="../assets/js/admin-exercicios.js"></script>
</body>
</html>
