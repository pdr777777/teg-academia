<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Financeiro - TEG Academia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../assets/img/favicon.png" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/app-effects.css" />
  <script src="../assets/js/theme.js"></script>
</head>
<body data-require-role="dono">

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <a href="../index.html" class="brand" title="Voltar para o site"><img src="../assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ADMIN</span></a>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-foot">
        <button type="button" id="btn-theme-toggle" data-theme-toggle class="btn btn-ghost btn-sm btn-block" data-icon="sun" data-icon-size="16" style="justify-content:flex-start;gap:0.7rem;padding:0.65rem 0.75rem;color:var(--color-muted)">Tema</button>
        <a href="#" id="btn-logout"><span data-icon="log-out" data-icon-size="18"></span>Sair</a>
      </div>
    </aside>

    <div class="main-content">
      <div class="page-head">
        <button class="btn btn-ghost btn-sm sidebar-toggle" id="btn-sidebar-toggle" data-icon="menu"></button>
        <div>
          <h1>Financeiro</h1>
          <p>Visão financeira do negócio.</p>
        </div>
      </div>

      <div class="grid grid-4 admin-stat-cards" id="financeiro-cards">
        <div class="loading-row" style="grid-column:1/-1"><span class="spinner"></span></div>
      </div>

      <div class="grid grid-2" style="margin-top:1.5rem">
        <div class="card" data-reveal>
          <div class="row-between" style="margin-bottom:1.25rem"><h2>Receita dos últimos 6 meses</h2></div>
          <div id="grafico-faturamento" class="chart-bars"></div>
        </div>
        <div class="card" data-reveal>
          <div class="row-between" style="margin-bottom:1.25rem"><h2>Distribuição por plano</h2></div>
          <div id="donut-planos"></div>
        </div>
      </div>

      <div class="grid grid-2" style="margin-top:1.5rem">
        <div class="card" data-reveal>
          <div class="row-between" style="margin-bottom:0.5rem"><h2>Transações recentes</h2></div>
          <div id="transacoes-recentes" class="transactions-list"></div>
        </div>
        <div class="card" data-reveal>
          <div class="row-between" style="margin-bottom:1.25rem"><h2>Metas do mês</h2></div>
          <div id="metas-progresso"></div>
        </div>
      </div>

      <div class="card" data-reveal style="margin-top:1.5rem">
        <div class="row-between" style="margin-bottom:1rem">
          <h2>Inadimplentes</h2>
          <span class="text-muted" id="inadimplentes-count"></span>
        </div>
        <div id="inadimplentes-lista" class="stack gap-sm"></div>
      </div>
    </div>
  </div>

  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/sidebar-nav.js"></script>
  <script src="../assets/js/app-effects.js"></script>
  <script src="../assets/js/admin-guard.js"></script>
  <script src="../assets/js/admin-financeiro.js"></script>
</body>
</html>
