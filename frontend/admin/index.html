<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin — Academia TEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../assets/img/favicon.png" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><img src="../assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ADMIN</span></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="active"><span data-icon="grid" data-icon-size="18"></span>Dashboard</a>
        <a href="alunos.html"><span data-icon="users" data-icon-size="18"></span>Alunos</a>
        <a href="crm.html"><span data-icon="columns" data-icon-size="18"></span>CRM</a>
        <a href="pagamentos.html"><span data-icon="credit-card" data-icon-size="18"></span>Pagamentos</a>
      </nav>
      <div class="sidebar-foot">
        <a href="#" id="btn-logout"><span data-icon="log-out" data-icon-size="18"></span>Sair</a>
      </div>
    </aside>

    <div class="main-content">
      <div class="page-head">
        <button class="btn btn-ghost btn-sm sidebar-toggle" id="btn-sidebar-toggle" data-icon="menu"></button>
        <div>
          <h1>Dashboard</h1>
          <p>Visão geral do negócio.</p>
        </div>
      </div>

      <div class="grid grid-3 admin-stat-cards" id="admin-cards">
        <div class="loading-row" style="grid-column:1/-1"><span class="spinner"></span></div>
      </div>

      <div class="card" style="margin-top:1.5rem">
        <div class="row-between" style="margin-bottom:1.25rem">
          <h2>Faturamento — últimos 6 meses</h2>
        </div>
        <div id="grafico-faturamento" class="chart-bars"></div>
      </div>
    </div>
  </div>

  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/admin-guard.js"></script>
  <script src="../assets/js/admin-dashboard.js"></script>
</body>
</html>
