<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planos — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../assets/img/favicon.png" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/app-effects.css" />
  <script src="../assets/js/theme.js"></script>
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <a href="../index.html" class="brand" title="Voltar para o site"><img src="../assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ADMIN</span></a>
      <nav class="sidebar-nav">
        <a href="index.html"><span data-icon="grid" data-icon-size="18"></span>Dashboard</a>
        <a href="financeiro.html" data-role-dono><span data-icon="wallet" data-icon-size="18"></span>Financeiro</a>
        <a href="alunos.html"><span data-icon="users" data-icon-size="18"></span>Alunos</a>
        <a href="ranking.html"><span data-icon="award" data-icon-size="18"></span>Ranking</a>
        <a href="frequencia.html"><span data-icon="clock" data-icon-size="18"></span>Frequência</a>
        <a href="treinos.html"><span data-icon="dumbbell" data-icon-size="18"></span>Treinos</a>
        <a href="aulas.html"><span data-icon="clipboard-list" data-icon-size="18"></span>Aulas</a>
        <a href="planos.html" class="active"><span data-icon="package" data-icon-size="18"></span>Planos</a>
        <a href="crm.html"><span data-icon="columns" data-icon-size="18"></span>CRM</a>
        <a href="pagamentos.html"><span data-icon="credit-card" data-icon-size="18"></span>Pagamentos</a>
        <a href="equipe.html" data-role-dono><span data-icon="briefcase" data-icon-size="18"></span>Equipe</a>
        <a href="configuracoes.html"><span data-icon="sliders" data-icon-size="18"></span>Configurações</a>
      </nav>
      <div class="sidebar-foot">
        <button type="button" id="btn-theme-toggle" data-theme-toggle class="btn btn-ghost btn-sm btn-block" data-icon="sun" data-icon-size="16" style="justify-content:flex-start;gap:0.7rem;padding:0.65rem 0.75rem;color:var(--color-muted)">Tema</button>
        <a href="#" id="btn-logout"><span data-icon="log-out" data-icon-size="18"></span>Sair</a>
      </div>
    </aside>

    <div class="main-content">
      <div class="page-head">
        <button class="btn btn-ghost btn-sm sidebar-toggle" id="btn-sidebar-toggle" data-icon="menu"></button>
        <div>
          <h1>Planos</h1>
          <p>Gerencie os planos de matrícula da academia.</p>
        </div>
        <button class="btn btn-primary btn-sm" id="btn-novo-plano">
          <span data-icon="plus" data-icon-size="14"></span>Novo plano
        </button>
      </div>

      <div class="table-wrap" data-reveal>
        <table>
          <thead>
            <tr><th>Nome</th><th>Duração</th><th>Preço/mês</th><th>Alunos ativos</th><th>Status</th><th style="width:80px"></th></tr>
          </thead>
          <tbody id="planos-body">
            <tr><td colspan="6" class="loading-row"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Dialog criar/editar plano -->
  <dialog id="dialog-plano" class="admin-dialog">
    <form id="form-plano" method="dialog">
      <h2 id="dialog-plano-titulo">Novo plano</h2>
      <input type="hidden" id="plano-edit-id" />

      <label class="field-label">Nome <span class="text-danger">*</span></label>
      <input type="text" id="plano-nome" class="input" placeholder="ex: Mensal, Trimestral" required />

      <label class="field-label" style="margin-top:.9rem">Descrição</label>
      <input type="text" id="plano-descricao" class="input" placeholder="Texto exibido na página de matrícula" />

      <div class="row gap-sm" style="margin-top:.9rem">
        <div style="flex:1">
          <label class="field-label">Preço mensal (R$) <span class="text-danger">*</span></label>
          <input type="number" id="plano-preco" class="input" placeholder="119.90" step="0.01" min="0" required />
        </div>
        <div style="flex:1">
          <label class="field-label">Duração (dias) <span class="text-danger">*</span></label>
          <input type="number" id="plano-duracao" class="input" placeholder="30" min="1" required />
        </div>
      </div>

      <div class="dialog-actions">
        <button type="button" class="btn btn-ghost" id="btn-plano-cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btn-plano-confirm">Salvar</button>
      </div>
    </form>
  </dialog>

  <script src="../assets/js/icons.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/app-effects.js"></script>
  <script src="../assets/js/admin-guard.js"></script>
  <script src="../assets/js/admin-planos.js"></script>
</body>
</html>
