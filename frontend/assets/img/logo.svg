<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 36" role="img" aria-label="TEG Academia">
  <defs>
    <!-- Metallic sweep for icon facets: deep red → orange highlight → gold peak → back -->
    <linearGradient id="mg-facets" x1="0" y1="0" x2="160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6b0000"/>
      <stop offset="20%"  stop-color="#cc2200"/>
      <stop offset="38%"  stop-color="#ff5500"/>
      <stop offset="50%"  stop-color="#ffaa44"/>
      <stop offset="62%"  stop-color="#ff5500"/>
      <stop offset="80%"  stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#6b0000"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        from="-160 0" to="160 0"
                        dur="2.8s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Metallic sweep for TEG text: dark silver → white peak → warm gold → silver -->
    <linearGradient id="mg-teg" x1="0" y1="0" x2="160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c0c0c0"/>
      <stop offset="25%"  stop-color="#e8e8e8"/>
      <stop offset="45%"  stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#fff8e7"/>
      <stop offset="55%"  stop-color="#ffffff"/>
      <stop offset="75%"  stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        from="-160 0" to="160 0"
                        dur="2.8s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Subtle metallic for ACADEMIA subtitle -->
    <linearGradient id="mg-sub" x1="0" y1="0" x2="160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(180,180,180,0.45)"/>
      <stop offset="45%"  stop-color="rgba(220,220,220,0.55)"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.75)"/>
      <stop offset="55%"  stop-color="rgba(220,220,220,0.55)"/>
      <stop offset="100%" stop-color="rgba(160,160,160,0.45)"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        from="-160 0" to="160 0"
                        dur="2.8s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Icon: 4 facets with metallic gradient -->
  <polygon points="0,0 13,9 0,18"   fill="url(#mg-facets)"/>
  <polygon points="0,18 13,9 13,27" fill="url(#mg-facets)"/>
  <polygon points="0,18 13,27 0,36" fill="url(#mg-facets)"/>
  <polygon points="13,9 26,18 13,27" fill="url(#mg-facets)"/>

  <!-- TEG -->
  <text x="34" y="25"
        font-family="'Arial Black','Arial','Helvetica Neue',sans-serif"
        font-size="22" font-weight="900" fill="url(#mg-teg)" letter-spacing="-0.5">TEG</text>

  <!-- Academia -->
  <text x="35.5" y="34.5"
        font-family="Arial,'Helvetica Neue',sans-serif"
        font-size="9" font-weight="500" fill="url(#mg-sub)" letter-spacing="2.5">ACADEMIA</text>
</svg>
