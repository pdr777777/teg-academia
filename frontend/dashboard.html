<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Área — Academia TEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/aluno.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
  <link rel="stylesheet" href="assets/css/app-effects.css" />
  <script src="assets/js/theme.js"></script>
</head>
<body>

  <header class="topnav">
    <a href="dashboard.html" class="brand"><img src="assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ACADEMIA</span></a>
    <nav class="topnav-links">
      <a href="dashboard.html" class="active"><span data-icon="home" data-icon-size="16"></span>Dashboard</a>
      <a href="treinos.html"><span data-icon="dumbbell" data-icon-size="16"></span>Treinos</a>
      <a href="ranking.html"><span data-icon="award" data-icon-size="16"></span>Ranking</a>
      <a href="indicacao.html"><span data-icon="link" data-icon-size="16"></span>Indicação</a>
      <a href="perfil.html"><span data-icon="user" data-icon-size="16"></span>Perfil</a>
    </nav>
    <div class="topnav-right">
      <button type="button" id="btn-theme-toggle" data-theme-toggle class="btn btn-ghost btn-sm" data-icon="sun" data-icon-size="16" title="Alternar tema"></button>
      <button class="btn btn-ghost btn-sm" id="btn-logout"><span data-icon="log-out" data-icon-size="16"></span>Sair</button>
      <button class="topnav-menu-btn btn-ghost btn-sm" id="btn-mobile-menu" data-icon="menu"></button>
    </div>
  </header>

  <main class="container aluno-main">
    <div id="bloqueio-banner"></div>

    <section id="cards-resumo">
      <div class="dash-hero card">
        <div>
          <p class="text-muted" id="saudacao">Carregando...</p>
          <h1 id="dash-nome">—</h1>
          <span class="badge badge-primary" id="dash-plano-badge"></span>
        </div>
        <div class="dash-xp-block">
          <div class="dash-xp-row">
            <span data-icon="zap" data-icon-size="18" class="text-primary"></span>
            <strong id="dash-xp">0 XP</strong>
            <span class="badge badge-muted" id="dash-nivel">Nível 1</span>
          </div>
          <div class="dash-xp-bar-wrap">
            <div class="dash-xp-bar"><div class="dash-xp-fill" id="dash-xp-fill" style="width:0%"></div></div>
            <span class="dash-xp-next" id="dash-xp-next">0 XP até o próximo nível</span>
          </div>
          <span class="dash-seq-label">
            <span data-icon="flame" data-icon-size="13" class="text-primary"></span>
            <span id="dash-sequencia">0</span> dias de sequência
          </span>
        </div>
      </div>

      <div class="grid grid-4 stat-cards">
        <div class="card stat-card" data-reveal>
          <span class="stat-icon"><span data-icon="calendar"></span></span>
          <strong id="stat-vencimento">—</strong>
          <span class="text-muted">Vencimento do plano</span>
        </div>
        <div class="card stat-card" data-reveal>
          <span class="stat-icon"><span data-icon="trending-up"></span></span>
          <strong id="stat-freq-mes">0</strong>
          <span class="text-muted">Dias treinados no mês</span>
        </div>
        <div class="card stat-card" data-reveal>
          <span class="stat-icon"><span data-icon="dumbbell"></span></span>
          <strong id="stat-total-treinos">0</strong>
          <span class="text-muted">Treinos no total</span>
        </div>
        <div class="card stat-card" data-reveal>
          <span class="stat-icon"><span data-icon="flame"></span></span>
          <strong id="stat-maior-sequencia">0</strong>
          <span class="text-muted">Maior sequência</span>
        </div>
      </div>
    </section>

    <div class="grid grid-2 dash-lower">
      <section id="frequencia-mes" class="card" data-reveal>
        <div class="row-between" style="margin-bottom:1rem">
          <h2>Frequência do mês</h2>
          <span data-icon="calendar" data-icon-size="18" class="text-muted"></span>
        </div>
        <div class="calendario-grid" id="calendario-grid"></div>
      </section>

      <section id="conquistas-recentes" class="card" data-reveal>
        <div class="row-between" style="margin-bottom:1rem">
          <h2>Conquistas recentes</h2>
          <span data-icon="award" data-icon-size="18" class="text-muted"></span>
        </div>
        <div id="lista-conquistas" class="stack gap-md"></div>
      </section>
    </div>

    <button id="btn-checkin" class="btn btn-primary btn-checkin">
      <span data-icon="check-circle"></span>Registrar treino de hoje
    </button>
  </main>

  <script src="assets/js/icons.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app-effects.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
