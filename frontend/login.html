<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Entrar - Academia TEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
  <link rel="stylesheet" href="assets/css/app-effects.css" />
</head>
<body>

  <div class="auth-wrap">
    <a href="index.html" class="auth-back"><span data-icon="chevron-left" data-icon-size="16"></span> Voltar para o site</a>

    <a href="index.html" class="brand auth-brand"><img src="assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ACADEMIA</span></a>

    <div class="card auth-card">
      <div class="tabs auth-tabs" id="auth-tabs">
        <button type="button" class="tab active" data-panel="entrar">Entrar</button>
        <a href="matricula.html" class="tab">Matricular-se</a>
      </div>

      <div class="auth-panel active" data-panel="entrar">
        <h1>Bem-vindo de volta</h1>
        <p class="text-muted" style="margin-bottom:1.75rem">Entre para acessar sua área do aluno.</p>

        <form id="form-login">
          <div class="field">
            <label for="login-email">E-mail</label>
            <div class="field-icon">
              <input type="email" id="login-email" name="email" required autocomplete="email" />
              <span class="field-icon-glyph" data-icon="mail" data-icon-size="17"></span>
            </div>
          </div>
          <div class="field">
            <label for="login-senha">Senha</label>
            <div class="field-icon has-toggle">
              <input type="password" id="login-senha" name="senha" required autocomplete="current-password" />
              <span class="field-icon-glyph" data-icon="lock" data-icon-size="17"></span>
              <button type="button" class="field-toggle" data-toggle-password="login-senha" aria-label="Mostrar senha">
                <span data-icon="eye" data-icon-size="17"></span>
              </button>
            </div>
          </div>

          <p id="login-bloqueio-msg" class="auth-bloqueio-msg"></p>
          <a href="esqueci-senha.html" id="link-esqueci-senha" class="auth-forgot">Esqueci minha senha</a>

          <button type="submit" class="btn btn-primary btn-block" id="btn-login">Entrar</button>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-root"></div>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app-effects.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
