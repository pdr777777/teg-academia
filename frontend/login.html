<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Entrar - Academia TEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
  <link rel="stylesheet" href="assets/css/app-effects.css" />
</head>
<body>

  <div class="auth-wrap">
    <a href="index.html" class="brand auth-brand"><img src="assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ACADEMIA</span></a>

    <form id="form-login" class="card auth-card">
      <h1>Bem-vindo de volta</h1>
      <p class="text-muted" style="margin-bottom:1.75rem">Entre para acessar sua área do aluno.</p>

      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required autocomplete="current-password" />
      </div>

      <p id="login-bloqueio-msg" class="auth-bloqueio-msg"></p>
      <a href="esqueci-senha.html" id="link-esqueci-senha" class="auth-forgot">Esqueci minha senha</a>

      <button type="submit" class="btn btn-primary btn-block" id="btn-login">Entrar</button>

      <div class="auth-divider"><span>ou</span></div>

      <a href="registro.html" class="btn btn-outline btn-block">Criar conta</a>
    </form>
  </div>

  <script src="assets/js/icons.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app-effects.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
