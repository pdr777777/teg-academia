<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Matricule-se — Academia TEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/matricula.css" />

<body>

  <header class="topnav">
    <a href="index.html" class="brand"><img src="assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ACADEMIA</span></a>
    <a href="login.html" class="btn btn-ghost btn-sm">Já tenho conta</a>
  </header>

  <main class="matricula-wrap">
    <div id="banner-indicacao" class="card banner-indicacao" style="display:none"></div>

    <section id="step-plano">
      <h1>Escolha o seu plano</h1>
      <p class="text-muted">Escolha abaixo e finalize direto com nossa equipe no WhatsApp.</p>
      <div id="planos-grid" style="margin-top:2rem">
        <div class="loading-row" style="grid-column:1/-1"><span class="spinner"></span></div>
      </div>
    </section>
  </main>

  <script src="assets/js/icons.js"></script>
  <script src="assets/js/api.js"></script>
