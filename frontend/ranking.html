<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ranking - Academia TEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/aluno.css" />
  <link rel="stylesheet" href="assets/css/liquid-glass.css" />
  <link rel="stylesheet" href="assets/css/ranking.css" />
  <link rel="stylesheet" href="assets/css/lightfall.css" />
  <link rel="stylesheet" href="assets/css/app-effects.css" />
  <script src="assets/js/theme.js"></script>
</head>
<body>

  <div class="dash-shell">
    <header class="dash-topbar">
      <a href="dashboard.html" class="sb-logo">
        <img src="assets/img/logo.svg" alt="" class="sb-logo-img" onerror="this.style.display='none'" />
        <span>TEG ACADEMIA</span>
      </a>
      <div class="dash-topbar-actions">
        <button type="button" id="btn-logout" aria-label="Sair"><span data-icon="log-out" data-icon-size="18"></span></button>
      </div>
    </header>

    <main class="dash-main aluno-main">
      <div class="page-head">
        <div>
          <h1>Ranking</h1>
          <p class="text-muted">Quem mais treinou por aqui.</p>
        </div>
        <div class="tabs" id="tabs-ranking">
          <button class="tab active" data-tipo="semanal">Semanal</button>
          <button class="tab" data-tipo="mensal">Mensal</button>
          <button class="tab" data-tipo="geral">Geral</button>
        </div>
      </div>

      <div id="minha-posicao-card" class="card minha-posicao"></div>

      <div class="table-wrap" style="margin-top:1.25rem" data-reveal>
        <table>
          <thead>
            <tr><th>#</th><th>Aluno</th><th>Treinos</th><th>XP</th><th>Sequência</th></tr>
          </thead>
          <tbody id="ranking-body">
            <tr><td colspan="5" class="loading-row"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>

      <section class="card" style="margin-top:2rem" data-reveal>
        <h2 style="margin-bottom:1rem">Conquistas</h2>
        <div id="conquistas-grid" class="grid grid-4"></div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="bottom-nav-item"><span data-icon="home" data-icon-size="20"></span><span>Início</span></a>
    <a href="treinos.html" class="bottom-nav-item"><span data-icon="dumbbell" data-icon-size="20"></span><span>Treinos</span></a>
    <a href="ranking.html" class="bottom-nav-item active"><span data-icon="award" data-icon-size="20"></span><span>Ranking</span></a>
    <a href="indicacao.html" class="bottom-nav-item"><span data-icon="link" data-icon-size="20"></span><span>Indicação</span></a>
    <a href="perfil.html" class="bottom-nav-item"><span data-icon="user" data-icon-size="20"></span><span>Perfil</span></a>
  </nav>

  <script src="assets/js/icons.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app-effects.js"></script>
  <script src="assets/js/lightfall-bg.js"></script>
  <script src="assets/js/lightfall-init.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  <script src="assets/js/ranking.js"></script>
</body>
</html>
