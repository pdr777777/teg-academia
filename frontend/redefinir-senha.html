<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Redefinir senha - Academia TEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
  <link rel="stylesheet" href="assets/css/app-effects.css" />
</head>
<body>

  <div class="auth-wrap">
    <a href="index.html" class="brand auth-brand"><img src="assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="brand-fallback"><span class="dot"></span>TEG ACADEMIA</span></a>

    <form id="form-redefinir-senha" class="card auth-card">
      <h1>Criar nova senha</h1>
      <p class="text-muted" style="margin-bottom:1.75rem">Escolha uma nova senha para sua conta.</p>

      <div class="field">
        <label for="senha">Nova senha</label>
        <div class="field-icon has-toggle">
          <input type="password" id="senha" minlength="8" placeholder="mín. 8 caracteres, letras e números" required autocomplete="new-password" />
          <span class="field-icon-glyph" data-icon="lock" data-icon-size="17"></span>
          <button type="button" class="field-toggle" data-toggle-password="senha" aria-label="Mostrar senha">
            <span data-icon="eye" data-icon-size="17"></span>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="confirmar-senha">Confirmar nova senha</label>
        <div class="field-icon has-toggle">
          <input type="password" id="confirmar-senha" minlength="8" required autocomplete="new-password" />
          <span class="field-icon-glyph" data-icon="lock" data-icon-size="17"></span>
          <button type="button" class="field-toggle" data-toggle-password="confirmar-senha" aria-label="Mostrar senha">
            <span data-icon="eye" data-icon-size="17"></span>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Redefinir senha</button>

      <div class="auth-links">
        <a href="login.html">← Voltar para o login</a>
      </div>
    </form>
  </div>

  <script src="assets/js/icons.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app-effects.js"></script>
  <script src="assets/js/redefinir-senha.js"></script>
</body>
</html>
