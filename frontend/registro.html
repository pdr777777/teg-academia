<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Criar conta — Academia TEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
  <link rel="stylesheet" href="assets/css/app-effects.css" />
</head>
<body>

  <div class="auth-wrap">
    <a href="index.html" class="brand auth-brand">
      <img src="assets/img/logo.svg" alt="TEG Academia" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <span class="brand-fallback"><span class="dot"></span>TEG ACADEMIA</span>
    </a>

    <!-- Formulário de registro -->
    <form id="form-registro" class="card auth-card" autocomplete="off">
      <h1>Criar conta</h1>
      <p class="text-muted" style="margin-bottom:1.75rem">Preencha seus dados para acessar a área do aluno.</p>

      <div class="field">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" required autocomplete="name" placeholder="Seu nome completo" />
      </div>
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="seu@email.com" />
      </div>
      <div class="field">
        <label for="telefone">WhatsApp</label>
        <input type="tel" id="telefone" name="telefone" required autocomplete="tel" placeholder="(67) 99999-9999" />
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required autocomplete="new-password" placeholder="Mínimo 8 caracteres com letra e número" />
      </div>
      <div class="field">
        <label for="confirmar_senha">Confirmar senha</label>
        <input type="password" id="confirmar_senha" name="confirmar_senha" required autocomplete="new-password" placeholder="Repita a senha" />
      </div>

      <button type="submit" class="btn btn-primary btn-block">Criar conta</button>

      <div class="auth-divider"><span>ou</span></div>

      <a href="login.html" class="btn btn-outline btn-block">Já tenho conta</a>
    </form>

    <!-- Tela de sucesso (oculta inicialmente) -->
    <div id="registro-sucesso" class="card auth-card" style="display:none;text-align:center">
      <div class="sucesso-icon">✓</div>
      <h2>Conta criada!</h2>
      <p class="text-muted" style="margin:0.75rem 0 1.75rem">Agora fale com nossa equipe no WhatsApp para escolher seu plano e finalizar sua matrícula.</p>
      <a id="btn-whatsapp" href="#" class="btn btn-primary btn-block" target="_blank" rel="noopener">
        Falar no WhatsApp
      </a>
      <a href="dashboard.html" class="btn btn-ghost btn-block" style="margin-top:0.5rem">Ir para minha área</a>
    </div>
  </div>

  <div id="toast-root"></div>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app-effects.js"></script>
  <script src="assets/js/registro.js"></script>
</body>
</html>
