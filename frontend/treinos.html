<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Meu Treino - Academia TEG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/aluno.css" />
  <link rel="stylesheet" href="assets/css/liquid-glass.css" />
  <link rel="stylesheet" href="assets/css/treinos.css" />
  <link rel="stylesheet" href="assets/css/app-effects.css" />
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/app-gate.js"></script>
</head>
<body>

  <!-- App nativo (Capacitor): tela de treino de verdade -->
  <div class="dash-shell" id="app-main">
    <header class="dash-topbar">
      <a href="index.html" class="sb-logo">
        <img src="assets/img/logo-icon.svg" alt="" class="sb-logo-img" onerror="this.style.display='none'" />
        <span>TEG ACADEMIA</span>
      </a>
      <div class="dash-topbar-actions">
        <button type="button" id="btn-logout" aria-label="Sair"><span data-icon="log-out" data-icon-size="18"></span></button>
      </div>
    </header>

    <main class="dash-main aluno-main">
      <div class="treino-tabs" id="treino-tabs" style="display:none"></div>

      <div class="page-head">
        <div>
          <h1 id="treino-nome">Meu treino</h1>
          <p id="treino-desc" class="text-muted"></p>
        </div>
        <button class="btn btn-primary" id="btn-iniciar-treino" style="display:none">
          <span data-icon="play" data-icon-size="16"></span>Iniciar treino
        </button>
      </div>

      <div id="sessao-bar" class="sessao-bar" style="display:none">
        <div class="row gap-sm" style="align-items:center">
          <span class="sessao-dot"></span>
          <span>Treino em andamento</span>
          <strong id="sessao-timer">00:00</strong>
        </div>
        <button class="btn btn-outline btn-sm" id="btn-finalizar-treino">
          <span data-icon="check-circle" data-icon-size="14"></span>Finalizar treino
        </button>
      </div>

      <div id="lista-exercicios" class="stack gap-lg">
        <div class="loading-row"><span class="spinner"></span></div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="app-main-nav">
    <a href="dashboard.html" class="bottom-nav-item"><span data-icon="home" data-icon-size="20"></span><span>Início</span></a>
    <a href="treinos.html" class="bottom-nav-item active"><span data-icon="dumbbell" data-icon-size="20"></span><span>Treinos</span></a>
    <a href="ranking.html" class="bottom-nav-item"><span data-icon="award" data-icon-size="20"></span><span>Ranking</span></a>
    <a href="indicacao.html" class="bottom-nav-item"><span data-icon="link" data-icon-size="20"></span><span>Indicação</span></a>
    <a href="perfil.html" class="bottom-nav-item"><span data-icon="user" data-icon-size="20"></span><span>Perfil</span></a>
  </nav>

  <!-- Navegador comum: convite pra baixar o app -->
  <div class="dash-shell" id="app-gate">
    <header class="dash-topbar">
      <a href="index.html" class="sb-logo">
        <img src="assets/img/logo-icon.svg" alt="" class="sb-logo-img" onerror="this.style.display='none'" />
        <span>TEG ACADEMIA</span>
      </a>
      <div class="dash-topbar-actions">
        <button type="button" id="btn-logout-gate" aria-label="Sair"><span data-icon="log-out" data-icon-size="18"></span></button>
      </div>
    </header>

    <main class="dash-main aluno-main app-gate-main">
      <section class="glass app-promo">
        <div class="app-promo-icon"><span data-icon="smartphone" data-icon-size="28"></span></div>
        <h1>Baixe nosso app</h1>
        <p>A área do aluno agora é só no app — treinos, check-in e sua evolução, sempre na palma da mão.</p>
        <div class="app-promo-stores">
          <!-- TODO: trocar href="#" pelo link real da App Store quando o Heros mandar -->
          <a href="#" class="store-badge" id="link-app-store" target="_blank" rel="noopener">
            <span class="store-badge-icon" data-icon="apple" data-icon-size="22"></span>
            <span class="store-badge-text"><small>Baixar na</small><strong>App Store</strong></span>
          </a>
          <!-- TODO: trocar href="#" pelo link real da Play Store quando o Heros mandar -->
          <a href="#" class="store-badge" id="link-play-store" target="_blank" rel="noopener">
            <span class="store-badge-icon" data-icon="play" data-icon-size="22"></span>
            <span class="store-badge-text"><small>Disponível no</small><strong>Google Play</strong></span>
          </a>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/icons.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app-effects.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  <script src="assets/js/treinos.js"></script>
</body>
</html>
